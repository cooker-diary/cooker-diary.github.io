<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cooker Diary</title>
    <meta name="description" content="Personal cooking recipe diary">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="index.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
</head>

<body>
    <div class="app-container">
        <header class="hero-header">
            <div class="hero-content">
                <div class="title-with-logo">
                    <img src="assets/logo.png" alt="Cooker Diary Logo" class="app-logo">
                    <h1 class="logo">Cooker Diary</h1>
                </div>
                <p class="subtitle">Your personal culinary journey, preserved.</p>
            </div>
            <div class="header-actions">
                <div id="adminControls" class="admin-controls">
                    <button id="loginBtn" class="icon-btn" title="Admin Login">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>
                            <path d="M7 11V7a5 5 0 0 1 10 0v4"></path>
                        </svg>
                    </button>
                    <button id="logoutBtn" class="icon-btn hidden" title="Logout">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                            <polyline points="16 17 21 12 16 7"></polyline>
                            <line x1="21" y1="12" x2="9" y2="12"></line>
                        </svg>
                    </button>
                </div>
                <button class="add-recipe-btn hidden" id="addRecipeBtn">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <line x1="12" y1="5" x2="12" y2="19"></line>
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                    </svg>
                    <span>Add Recipe</span>
                </button>
            </div>
        </header>

        <div class="controls-bar">
            <div class="search-container">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round" class="search-icon">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search recipes by title or description...">
            </div>
            <div class="filter-container" style="display: flex; gap: 1rem;">
                <select id="sortFilter" class="glass-select">
                    <option value="newest">Newest First</option>
                    <option value="oldest">Oldest First</option>
                    <option value="highest">Highest Rated</option>
                    <option value="lowest">Lowest Rated</option>
                </select>
                <select id="categoryFilter" class="glass-select">
                    <option value="All">All Categories</option>
                    <option value="Breakfast">Breakfast</option>
                    <option value="Lunch">Lunch</option>
                    <option value="Dinner">Dinner</option>
                    <option value="Dessert">Dessert</option>
                    <option value="Snack">Snack</option>
                    <option value="Drink">Drink</option>
                    <option value="Ingredient">Ingredient</option>
                </select>
            </div>
        </div>

        <main class="recipe-grid-container">
            <div id="recipeGrid" class="recipe-grid">
                <!-- Recipe Cards injected here -->
            </div>
            <div class="pagination-container" style="text-align: center; margin-top: 2rem;">
                <button id="loadMoreBtn" class="add-recipe-btn hidden" style="margin: 0 auto;">Load More</button>
            </div>
        </main>
    </div>

    <!-- Add Recipe Modal -->
    <div class="modal-overlay" id="addRecipeModal">
        <div class="modal-content glass-panel">
            <button class="close-btn" id="closeModalBtn">&times;</button>
            <h2>New Recipe</h2>
            <form id="recipeForm">
                <div class="input-group">
                    <label for="recipeTitle">Title</label>
                    <input type="text" id="recipeTitle" required placeholder="E.g. Spicy Garlic Noodles">
                </div>
                <div class="input-group">
                    <label for="recipeImage">Recipe Image (Optional)</label>
                    <input type="file" id="recipeImage" accept="image/*">
                </div>

                <div class="form-row">
                    <div class="input-group flex-1">
                        <label for="recipeCategory">Category</label>
                        <select id="recipeCategory" required class="glass-select">
                            <option value="Breakfast">Breakfast</option>
                            <option value="Lunch">Lunch</option>
                            <option value="Dinner">Dinner</option>
                            <option value="Dessert">Dessert</option>
                            <option value="Snack">Snack</option>
                            <option value="Drink">Drink</option>
                            <option value="Ingredient">Ingredient</option>
                        </select>
                    </div>

                    <div class="input-group flex-1">
                        <label>Rating</label>
                        <div class="star-rating-input" id="starRatingInput">
                            <span class="star" data-value="1">★</span>
                            <span class="star" data-value="2">★</span>
                            <span class="star" data-value="3">★</span>
                            <span class="star" data-value="4">★</span>
                            <span class="star" data-value="5">★</span>
                        </div>
                        <input type="hidden" id="recipeRating" value="0">
                    </div>
                </div>

                <div class="input-group">
                    <label for="recipeDesc">Short Description or Notes</label>
                    <textarea id="recipeDesc" rows="5" required
                        placeholder="A brief description, your thoughts, or the actual recipe..."></textarea>
                </div>
                <button type="submit" class="submit-btn">Save Recipe</button>
            </form>
        </div>
    </div>

    <!-- View Recipe Modal -->
    <div class="modal-overlay" id="viewRecipeModal">
        <div class="modal-content glass-panel recipe-details">
            <button class="close-btn" id="closeViewModalBtn">&times;</button>
            <img id="detailImage" src="" alt="Recipe Image" class="detail-header-img">
            <div class="detail-body">
                <span id="detailDate" class="detail-date"></span>
                <h2 id="detailTitle"></h2>
                <p id="detailDesc" class="detail-description"></p>
                <div class="detail-actions">
                    <button id="shareRecipeBtn" class="share-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="18" cy="5" r="3"></circle>
                            <circle cx="6" cy="12" r="3"></circle>
                            <circle cx="18" cy="19" r="3"></circle>
                            <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"></line>
                            <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"></line>
                        </svg>
                        Share
                    </button>
                    <button id="editRecipeBtn" class="edit-btn hidden">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path>
                            <path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path>
                        </svg>
                        Edit
                    </button>
                    <button id="deleteRecipeBtn" class="danger-btn hidden">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                            stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polyline points="3 6 5 6 21 6"></polyline>
                            <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2">
                            </path>
                        </svg>
                        Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer
        style="text-align: center; padding: 2rem; margin-top: 3rem; border-top: 1px solid rgba(255,255,255,0.05); color: var(--text-muted); font-size: 0.95rem;">
        <p>&copy; 2026 Cooker Diary. All rights reserved.</p>
        <p style="font-size: 0.8rem; margin-top: 0.5rem; opacity: 0.6;">Disclaimer: Recipes provided for informational
            purposes. Nutritional values and cooking times are approximate.</p>
    </footer>

    <div class="toast-container" id="toastContainer"></div>

    <script src="app.js"></script>
</body>

</html>
